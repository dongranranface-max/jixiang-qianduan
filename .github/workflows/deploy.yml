# ============================================
#  deploy.yml - 集享公社用户端自动化部署
#  触发条件：push 到 main 分支
# ============================================
name: Deploy Qianduan to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --force

      - name: Build H5
        run: npm run build:h5

      - name: Find and package build output
        run: |
          set -e
          if [ -d "unpackage/dist/build/h5" ]; then
            echo "Using unpackage/dist/build/h5"
            tar -czf jixiang-qianduan-h5.tar.gz -C unpackage/dist/build/h5 .
          elif [ -d "dist/build/h5" ]; then
            echo "Using dist/build/h5"
            tar -czf jixiang-qianduan-h5.tar.gz -C dist/build/h5 .
          elif [ -d "dist" ]; then
            echo "Using dist"
            tar -czf jixiang-qianduan-h5.tar.gz -C dist .
          else
            echo "ERROR: No build output found"
            ls -la
            exit 1
          fi

      - name: Generate SSH Key
        run: |
          ssh-keygen -t ed25519 -C "qianduan-actions" -f /tmp/deploy_key -N "" -q
          echo "PUBLIC_KEY=$(cat /tmp/deploy_key.pub)" >> $GITHUB_ENV

      - name: Deploy to Server
        run: |
          chmod 600 /tmp/deploy_key
          # Add public key to server
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i /tmp/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p ~/.ssh && echo '${{ env.PUBLIC_KEY }}' >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys"
          # Deploy files
          cat jixiang-qianduan-h5.tar.gz | ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key root@${{ secrets.DEPLOY_HOST }} "cd /www/jixiang-qianduan/h5 && tar -xz && nginx -s reload"

      - name: Health Check
        run: |
          sleep 3
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key root@${{ secrets.DEPLOY_HOST }} "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1/mall/ || echo 'HEALTH_CHECK_FAILED'"
