# ============================================
#  deploy.yml - 集享公社用户端自动化部署
#  使用 appleboy/ssh-action 处理 SSH 部署
#  私钥通过 base64 编码传入，解决多行文本问题
# ============================================
name: Deploy Qianduan to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --force

      - name: Build H5
        run: npm run build:h5

      - name: Find and package build output
        run: |
          set -e
          if [ -d "unpackage/dist/build/h5" ]; then
            tar -czf jixiang-qianduan-h5.tar.gz -C unpackage/dist/build/h5 .
          elif [ -d "dist/build/h5" ]; then
            tar -czf jixiang-qianduan-h5.tar.gz -C dist/build/h5 .
          elif [ -d "dist" ]; then
            tar -czf jixiang-qianduan-h5.tar.gz -C dist .
          else
            echo "ERROR: No build output found"
            ls -la
            exit 1
          fi

      - name: Prepare private key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          printf '%s\n' "$SSH_KEY" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key_path: /tmp/deploy_key.pem
          command: |
            mkdir -p /www/jixiang-qianduan/h5
            cd /www/jixiang-qianduan/h5
            tar -xz
            nginx -s reload
          tar: ./jixiang-qianduan-h5.tar.gz
          dest: /www/jixiang-qianduan/h5
          overwrite: true
          debug: true